<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Dashboard — Nebula Components</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      font-size: 15px;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }
    header { border-bottom: 1px solid #1e1e2e; padding-bottom: 20px; margin-bottom: 32px; }
    .logo { color: #6366f1; font-weight: 700; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; }
    h1 { font-size: 1.5rem; font-weight: 800; color: #f8fafc; margin-bottom: 8px; }
    .sub { color: #94a3b8; font-size: 0.9rem; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
    @media (max-width: 640px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: #12121c;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .stat-card .num { font-size: 2rem; font-weight: 800; color: #f8fafc; }
    .stat-card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-top: 4px; }
    .stat-card.green { border-color: #22c55e; }
    .stat-card.green .num { color: #22c55e; }
    .stat-card.amber { border-color: #f59e0b; }
    .stat-card.amber .num { color: #f59e0b; }
    .stat-card.red { border-color: #ef4444; }
    .stat-card.red .num { color: #ef4444; }
    .stat-card.blue { border-color: #6366f1; }
    .stat-card.blue .num { color: #6366f1; }

    .stage-table {
      width: 100%;
      border-collapse: collapse;
      background: #12121c;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .stage-table th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      background: #0d1117;
      border-bottom: 1px solid #1e1e2e;
    }
    .stage-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a2a;
      font-size: 0.9rem;
    }
    .stage-table tr:last-child td { border-bottom: none; }
    .stage-table .count { font-weight: 700; text-align: center; }
    .stage-free_kit { border-left: 3px solid #64748b; }
    .stage-audit { border-left: 3px solid #6366f1; }
    .stage-warm { border-left: 3px solid #f59e0b; }
    .stage-97 { border-left: 3px solid #22c55e; }
    .stage-997 { border-left: 3px solid #10b981; }
    .stage-197 { border-left: 3px solid #06b6d4; }
    .stage-sdr { border-left: 3px solid #8b5cf6; }

    .export-bar {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      background: #12121c; border: 1px solid #1e1e2e; border-radius: 12px; padding: 20px;
      margin-bottom: 24px;
    }
    .export-bar select, .export-bar button {
      background: #0d1117; color: #e2e8f0; border: 1px solid #2d2d4e; border-radius: 8px;
      padding: 10px 16px; font-size: 0.85rem; font-family: 'Inter', sans-serif;
    }
    .export-bar button {
      background: #6366f1; color: #fff; font-weight: 600; cursor: pointer; border: none;
    }
    .export-bar button:hover { background: #5254cc; }
    .export-bar .label { color: #94a3b8; font-size: 0.8rem; }

    .recent-list { list-style: none; margin-top: 12px; }
    .recent-list li {
      padding: 8px 12px; border-bottom: 1px solid #1a1a2a; font-size: 0.85rem;
      display: flex; justify-content: space-between;
    }
    .recent-list .email { color: #e2e8f0; }
    .recent-list .stage-badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 999px;
      background: #1e1e2e; color: #94a3b8;
    }
    .recent-list .stage-badge.customer { background: #0a1a0f; color: #22c55e; }

    .refresh { color: #64748b; font-size: 0.8rem; cursor: pointer; float: right; }
    .refresh:hover { color: #e2e8f0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="logo">Nebula Components</a>
      <div style="float:right;">
        <a href="/" style="color:#64748b;font-size:13px;margin-left:12px;">Home</a>
        <a href="/checkout.html" style="color:#64748b;font-size:13px;margin-left:12px;">Checkout</a>
      </div>
    </header>

    <h1>Lead Segmentation Dashboard</h1>
    <p class="sub">Mailing list broken down by buyer stage. <span class="refresh" onclick="loadStats()">&#x21bb; Refresh</span></p>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card blue"><div class="num" id="stat-total">-</div><div class="label">Total Leads</div></div>
      <div class="stat-card green"><div class="num" id="stat-active">-</div><div class="label">Active</div></div>
      <div class="stat-card amber"><div class="num" id="stat-non-customer">-</div><div class="label">Non-Customers</div></div>
      <div class="stat-card red"><div class="num" id="stat-opted-out">-</div><div class="label">Opted Out</div></div>
    </div>

    <table class="stage-table" id="stage-table">
      <thead>
        <tr><th>Stage</th><th>Count</th><th>Action</th></tr>
      </thead>
      <tbody id="stage-rows"></tbody>
    </table>

    <div class="export-bar">
      <span class="label">Export segment:</span>
      <select id="export-stage">
        <option value="all">All leads</option>
        <option value="active">Active leads</option>
        <option value="non_customer">Non-customers (upsell)</option>
        <option value="lead_free_kit">Free kit only</option>
        <option value="lead_audit">Ran audit</option>
        <option value="lead_warm">Warm</option>
        <option value="customer_97">$147 customers</option>
        <option value="customer_997">$997 customers</option>
      </select>
      <button onclick="exportCSV()">Download CSV &#x2193;</button>
    </div>

    <div style="background:#12121c;border:1px solid #1e1e2e;border-radius:12px;padding:20px;">
      <h3 style="font-size:0.9rem;font-weight:700;color:#f1f5f9;margin-bottom:8px;">Recent Opt-Outs</h3>
      <ul class="recent-list" id="opted-out-list">
        <li style="color:#64748b;font-size:0.85rem;">Load stats to see...</li>
      </ul>
    </div>
  </div>

  <script>
    async function loadStats() {
      try {
        const resp = await fetch('/api/leads/stats');
        const data = await resp.json();

        document.getElementById('stat-total').textContent = data.total_leads;
        document.getElementById('stat-active').textContent = data.active_leads;
        document.getElementById('stat-non-customer').textContent = data.non_customer_count;
        document.getElementById('stat-opted-out').textContent = data.opted_out_count;

        // Also fetch CSV to show recent activity
        const csvResp = await fetch('/api/leads/export?stage=all');
        const csv = await csvResp.text();
        const lines = csv.trim().split('\n').slice(1); // skip header

        const tbody = document.getElementById('stage-rows');
        const stageLabels = data.by_stage_labels;
        let stageRows = '';
        for (const [stage, count] of Object.entries(data.by_stage)) {
          const label = stageLabels[stage] || stage;
          const cls = stage.replace(/_/g, '-');
          stageRows += `<tr class="stage-${cls}"><td>${label}</td><td class="count">${count}</td><td><a href="#" onclick="exportCSV('${stage}');return false;" style="color:#818cf8;font-size:0.8rem;">Export</a></td></tr>`;
        }
        tbody.innerHTML = stageRows;

        // Recent opt-outs from CSV (show up to 5)
        const optedOutList = document.getElementById('opted-out-list');
        // We need to find opted-out leads - check the stats API doesn't expose individual leads
        // For now just show the count
        optedOutList.innerHTML = '<li style="color:#94a3b8;font-size:0.85rem;">' +
          data.opted_out_count + ' lead(s) opted out. <a href="/api/leads/export?stage=all" style="color:#818cf8;">Full CSV</a> has details.</li>';
      } catch (err) {
        document.getElementById('stat-total').textContent = 'Error';
        document.getElementById('stat-total').parentElement.className = 'stat-card red';
      }
    }

    function exportCSV(stage) {
      const s = stage || document.getElementById('export-stage').value;
      const query = s === 'all' ? '' : '?stage=' + s;
      window.open('/api/leads/export' + query, '_blank');
    }

    loadStats();
  </script>
</body>
</html>
