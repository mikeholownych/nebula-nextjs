  <rect x='478' y='442' width='164' height='44' rx='22' fill='#1f2937' stroke='#374151' stroke-width='1'/>
  <text x='560' y='469' font-family="-apple-system,Arial,sans-serif" font-size='16' fill='#d1d5db' text-anchor='middle'>🤝 Trust gap</text>
  <rect x='656' y='442' width='196' height='44' rx='22' fill='#1f2937' stroke='#374151' stroke-width='1'/>
