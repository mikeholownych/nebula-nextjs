{
  "schema_version": 1,
  "manifest_purpose": "current_and_target_service_route_ownership",
  "observed_hostname_path": {
    "hosts": [
      "nebulacomponents.shop",
      "www.nebulacomponents.shop"
    ],
    "cloudflared_origin": "http://localhost:8765",
    "owner": "agentic_server"
  },
  "services": {
    "agentic_server": {
      "systemd_unit": "nebula-site.service",
      "bind": "0.0.0.0:8765",
      "run_as": "mike"
    },
    "webhook_server": {
      "systemd_unit": "nebula-webhook.service",
      "bind": "0.0.0.0:9000",
      "run_as": "mike"
    },
    "platform_api": {
      "target_bind": "127.0.0.1:8770",
      "state": "target_not_live"
    },
    "next": {
      "target_bind": "127.0.0.1:3000",
      "state": "target_not_live"
    }
  },
  "routes": [
    {
      "name": "stripe_webhook",
      "path": "/stripe-webhook",
      "current_owner": "agentic_server",
      "target_owner": "platform_api",
      "transition_gate": "verified_idempotent_stripe_processor"
    },
    {
      "name": "platform_api",
      "path_prefix": "/api/platform/",
      "current_owner": "agentic_server",
      "target_owner": "platform_api",
      "transition_gate": "platform_api_readiness"
    },
    {
      "name": "crm",
      "path_prefix": "/api/crm",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "stats",
      "path": "/api/stats",
      "current_owner": "agentic_server",
      "current_upstream": "webhook_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "agent_discovery",
      "path_prefix": "/.well-known/",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "auth_document",
      "path": "/auth.md",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "llm_document",
      "path": "/llms.txt",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "openapi_document",
      "path": "/openapi.json",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "agent_protocol",
      "path_prefix": "/agent/",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "tracking",
      "path_prefix": "/track/",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "legacy_webhooks",
      "path_prefix": "/rb2b-webhook",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "current_public_api",
      "path_prefix": "/api/",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "lead_dashboard",
      "path": "/lead-dashboard.html",
      "route_class": "protected_python",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "service_health",
      "path": "/health",
      "route_class": "protected_python",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "newsletter_submission",
      "path": "/newsletter",
      "route_class": "protected_python",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "notion_audit",
      "path": "/notion/audit",
      "route_class": "protected_python",
      "current_owner": "agentic_server",
      "target_owner": "agentic_server"
    },
    {
      "name": "legacy_public_redirects",
      "path_regex": "^/(?:privacy-policy|create_97_checkout\\.html|launch_page_97\\.html|checkout_v2\\.html|checkout-impulse\\.html)$",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "legacy_redirect_parity_canary"
    },
    {
      "name": "public_metadata",
      "path_regex": "^/(?:sitemap\\.xml|robots\\.txt)$",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "public_metadata_parity_canary"
    },
    {
      "name": "audit_slash",
      "path": "/audit/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "interactive_audit_parity_canary"
    },
    {
      "name": "lead_magnets",
      "path_prefix": "/lead-magnets/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "lead_magnets_parity_canary"
    },
    {
      "name": "prompt_packs",
      "path_prefix": "/prompt-pack/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "prompt_pack_parity_canary"
    },
    {
      "name": "case_studies_root",
      "path": "/case-studies",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "case_studies_parity_canary"
    },
    {
      "name": "learning_centre_uk_root",
      "path": "/learning-centre",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "learning_centre_parity_canary"
    },
    {
      "name": "learning_centre_us_root",
      "path": "/learning-center",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "learning_centre_alias_parity_canary"
    },
    {
      "name": "case_studies",
      "path_prefix": "/case-studies/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "case_studies_parity_canary"
    },
    {
      "name": "learning_centre_uk",
      "path_prefix": "/learning-centre/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "learning_centre_parity_canary"
    },
    {
      "name": "learning_centre_us",
      "path_prefix": "/learning-center/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "learning_centre_alias_parity_canary"
    },
    {
      "name": "articles",
      "path_prefix": "/articles/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "articles_parity_canary"
    },
    {
      "name": "comparisons",
      "path_prefix": "/comparisons/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "comparisons_parity_canary"
    },
    {
      "name": "products",
      "path_prefix": "/products/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "products_parity_canary"
    },
    {
      "name": "interactive_audit",
      "path": "/audit",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "interactive_audit_parity_canary"
    },
    {
      "name": "homepage",
      "path": "/",
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "homepage_parity_canary"
    },
    {
      "name": "public_default",
      "default": true,
      "route_class": "public_page_family",
      "current_owner": "agentic_server",
      "target_owner": "next",
      "transition_gate": "final_public_cutover"
    }
  ],
  "unknown_host": {
    "owner": "terminal_404",
    "status": 404,
    "terminal": true
  }
}
