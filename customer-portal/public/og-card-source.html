<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/styles/nebula-design-system.css">

<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #111827;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
  padding: 72px 80px;
 background: var(--bg); color: var(--fg);}
.eyebrow { color: #6ee7b7; font-size: 18px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 20px; }
h1 { color: #fff; font-size: 56px; line-height: 1.08; letter-spacing: -0.02em; max-width: 800px; margin-bottom: 28px; }
h1 em { color: #6ee7b7; font-style: normal; }
.sub { color: #9ca3af; font-size: 22px; max-width: 700px; line-height: 1.4; margin-bottom: 40px; }
.pills { display: flex; gap: 16px; }
.pill { background: #1f2937; border: 1px solid #374151; color: #d1d5db; font-size: 15px; padding: 8px 18px; border-radius: 20px; }
.logo { position: absolute; bottom: 48px; right: 72px; color: #9ca3af; font-size: 16px; }
</style>
</head>
<body>
  <div class="eyebrow">Free · 60 seconds · No call</div>
  <h1>Your landing page is <em>leaking buyers.</em></h1>
  <p class="sub">Paste your URL. Get a scored audit across 5 conversion dimensions. Free fix kit or $147 implementation.</p>
  <div class="pills">
    <div class="pill">🎯 Clarity</div>
    <div class="pill">🖱️ CTA friction</div>
    <div class="pill">🤝 Trust gap</div>
    <div class="pill">📦 Offer specificity</div>
    <div class="pill">🔧 Difficulty</div>
  </div>
  <div class="logo">nebulacomponents.shop</div>
</body>
</html>
